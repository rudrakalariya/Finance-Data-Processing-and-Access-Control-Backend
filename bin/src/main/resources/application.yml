server:
  port: 8080

spring:
  application:
    name: finance-api
  datasource:
    url: jdbc:h2:mem:finance_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: aW5jcmVkaWJseXNlY3VyZWFuZGxvbmdzZWNyZXRrZXlmb3JmaW5hbmNlYXBwbGljYXRpb25qd3RzZWN1cml0eQ== # Base64 encoded key (must be at least 256 bits)
  expiration: 86400000 # 24 hours in milliseconds

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
